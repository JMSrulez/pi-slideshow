<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>{{ app_title }}</title>

  <style>
    :root {
      --bg: #0f172a;
      --bg-alt: #1e293b;
      --panel: #020617;
      --border-subtle: #1f2937;
      --accent: #38bdf8;
      --accent-soft: rgba(56, 189, 248, 0.15);
      --text: #e5e7eb;
      --text-muted: #9ca3af;
      --danger: #f97373;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top left, #1e293b, #020617 55%);
      color: var(--text);
      display: flex;
      flex-direction: column;
    }

    .app-shell {
      display: grid;
      grid-template-rows: auto 1fr;
      grid-template-columns: minmax(260px, 320px) minmax(0, 1fr);
      grid-template-areas:
        "header header"
        "sidebar main";
      min-height: 100vh;
    }

    header {
      grid-area: header;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border-subtle);
      background: linear-gradient(to right, rgba(15,23,42,0.95), rgba(15,23,42,0.9));
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .app-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.03em;
    }

    .app-badge {
      padding: 3px 8px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .status-bar {
      font-size: 13px;
      color: var(--text-muted);
    }

    .layout-sidebar {
      grid-area: sidebar;
      border-right: 1px solid var(--border-subtle);
      background: radial-gradient(circle at top left, #020617 0, #020617 40%, #0b1120 100%);
      padding: 18px 18px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .layout-main {
      grid-area: main;
      padding: 18px 18px 24px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      overflow: hidden;
    }

    .panel {
      border-radius: 14px;
      border: 1px solid var(--border-subtle);
      background: linear-gradient(to bottom right, rgba(15,23,42,0.96), rgba(15,23,42,0.9));
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.6);
    }

    .panel-header {
      padding: 12px 14px 8px;
      border-bottom: 1px solid rgba(15,23,42,0.7);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .panel-title {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
    }

    .panel-body {
      padding: 12px 14px 14px;
    }

    /* Upload zone */
.upload-zone {
  position: relative;
  border-radius: 10px;
  border: 1px dashed rgba(148, 163, 184, 0.7);
  padding: 12px 12px 26px; /* un peu plus bas pour laisser la place au bouton */
  background: rgba(15, 23, 42, 0.7);
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.upload-main {
  display: flex;
  flex-direction: column;
  gap: 6px;
  font-size: 13px;
}

.upload-hint {
  font-size: 12px;
  color: var(--text-muted);
}

.upload-input-hidden {
  display: none;
}

/* Ligne : bouton 'Sélectionner' + texte "n fichiers sélectionnés" */
.upload-actions-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  margin-top: 6px;
}

.upload-filename {
  font-size: 12px;
  color: var(--text-muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* Bouton Uploader en bas, chevauchant le cadre */
.upload-submit-btn {
  position: absolute;
  left: 10px;
  bottom: -14px; /* débord en partie basse */
  padding-inline: 16px;
  z-index: 1;
}

    /* Buttons */

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 7px 12px;
      border-radius: 999px;
      border: 1px solid transparent;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      background: transparent;
      color: var(--text);
      transition: background 0.15s ease, border-color 0.15s ease, transform 0.08s ease, box-shadow 0.15s ease;
      white-space: nowrap;
    }

    .btn-primary {
      background: linear-gradient(135deg, #38bdf8, #0ea5e9);
      border-color: rgba(8, 47, 73, 0.7);
      color: #0b1120;
      box-shadow: 0 10px 30px rgba(56, 189, 248, 0.35);
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, #0ea5e9, #22c1c3);
      transform: translateY(-1px);
      box-shadow: 0 14px 40px rgba(56, 189, 248, 0.5);
    }

    .btn-ghost {
      border-color: rgba(148, 163, 184, 0.5);
      background: rgba(15, 23, 42, 0.6);
      color: var(--text-muted);
    }

    .btn-ghost:hover {
      border-color: rgba(248, 250, 252, 0.4);
      background: rgba(15, 23, 42, 0.9);
      color: var(--text);
    }

    .btn-danger {
      border-color: rgba(239, 68, 68, 0.7);
      background: rgba(127, 29, 29, 0.4);
      color: #fecaca;
    }

    .btn-danger:hover {
      background: rgba(220, 38, 38, 0.75);
      border-color: rgba(252, 165, 165, 0.9);
      transform: translateY(-1px);
      box-shadow: 0 10px 30px rgba(248, 113, 113, 0.45);
      color: #111827;
    }

    /* Infos du job */

    .job-info {
      font-size: 12px;
      color: var(--text-muted);
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-top: 6px;
    }

    #status {
      font-size: 12px;
      color: var(--accent);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 260px;
    }

    /* Zone preview vidéo */

    .preview-block {
      margin-top: 8px;
      padding: 8px 10px;
      border-radius: 10px;
      background: rgba(15, 23, 42, 0.85);
      border: 1px solid rgba(30, 64, 175, 0.6);
      font-size: 12px;
      color: var(--text-muted);
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .preview-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
    }

    .preview-title {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #bfdbfe;
    }

    .preview-video {
      margin-top: 4px;
    }

    .preview-video video {
      width: 100%;
      max-width: 280px;
      border-radius: 10px;
      border: 1px solid rgba(148, 163, 184, 0.6);
      background: #020617;
      display: block;
    }

    /* Galerie d’images */

    .images-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .images-count {
      font-size: 12px;
      color: var(--text-muted);
    }

    .images-grid-wrapper {
      max-height: calc(100vh - 130px);
      overflow: auto;
      padding: 12px 12px 2px;
    }

    #images {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
      gap: 10px;
    }

    .item {
      margin: 0;
      padding: 8px 8px 10px;
      border-radius: 12px;
      border: 1px solid rgba(51, 65, 85, 0.9);
      background: radial-gradient(circle at top, #1f2937, #020617);
      text-align: left;
      display: flex;
      flex-direction: column;
      gap: 6px;
      cursor: grab;
      transition: border-color 0.15s ease, transform 0.1s ease, box-shadow 0.15s ease;
    }

    .item:active {
      cursor: grabbing;
      transform: scale(0.98);
    }

    .item-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      font-size: 12px;
    }

    .item-index {
      font-weight: 600;
      color: #e5e7eb;
    }

    .item-filename {
      font-size: 11px;
      color: var(--text-muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 120px;
    }

    .thumb {
      display: block;
      width: 100%;
      height: 120px;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid rgba(31, 41, 55, 0.9);
      background: #020617;
    }

    .item-controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      font-size: 12px;
    }

    .dur-label {
      color: var(--text-muted);
    }

    .dur-input {
      width: 56px;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.8);
      background: rgba(15, 23, 42, 0.9);
      color: var(--text);
      padding: 3px 6px;
      font-size: 12px;
      text-align: center;
      outline: none;
    }

    .dur-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px rgba(56, 189, 248, 0.5);
    }

    .del-btn {
      border: none;
      background: transparent;
      color: rgba(248, 113, 113, 0.9);
      cursor: pointer;
      padding: 0 4px;
      font-size: 14px;
    }

    .del-btn:hover {
      color: #fecaca;
    }

    /* Responsive */

    @media (max-width: 800px) {
      .app-shell {
        grid-template-columns: 1fr;
        grid-template-areas:
          "header"
          "sidebar"
          "main";
      }
      header {
        position: static;
      }
      .layout-main {
        padding-top: 6px;
      }
      .images-grid-wrapper {
        max-height: none;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header>
      <div class="app-title">
        <span>{{ app_title }}</span>
        <span class="app-badge">Pi slideshow</span>
      </div>
      <div class="status-bar">
        <span id="status">Prêt</span>
      </div>
    </header>

    <!-- Colonne de gauche : upload + actions + preview -->
    <aside class="layout-sidebar">
      <div class="panel">
        <div class="panel-header">
          <div class="panel-title">Images &amp; vidéo</div>
        </div>
        <div class="panel-body">
<form id="uploadForm" class="upload-zone">
  <div class="upload-main">
    <strong>Ajouter des images</strong>
    <div class="upload-hint">
      PNG / JPEG, redimensionnées automatiquement en 1280×720 pour le Pi.
    </div>
  </div>

  <!-- Input fichier caché -->
  <input
    id="fileInput"
    class="upload-input-hidden"
    type="file"
    name="files"
    multiple
    accept="image/png,image/jpeg,image/jpg">

  <div class="upload-actions-top">
    <button type="button" id="selectFilesBtn" class="btn btn-ghost">
      📁 Sélectionner des fichiers
    </button>
    <div id="selectedFilesLabel" class="upload-filename"></div>
  </div>

  <!-- Bouton Uploader seul, sous le texte -->
  <button type="submit" class="btn btn-primary upload-submit-btn">
    ⬆ Uploader
  </button>
</form>
          <div style="margin-top: 25px; display: flex; gap: 8px;">
            <button id="generateBtn" class="btn btn-primary" style="flex: 1;">
              ▶ Générer la vidéo
            </button>
            <button id="clearBtn" class="btn btn-danger">
              🗑 Vider
            </button>
          </div>

          <div class="job-info">
            <span>Statut : <span id="status-text"></span></span>
          </div>

          <div class="preview-block">
            <div class="preview-header">
              <span class="preview-title">Vidéo actuelle</span>
            </div>
            <div id="preview-info">
              Aucune vidéo générée pour le moment.
            </div>
            <div id="preview-video" class="preview-video"></div>
          </div>
        </div>
      </div>
    </aside>

    <!-- Colonne de droite : galerie / ordre des images -->
    <main class="layout-main">
      <div class="panel" style="height: 100%;">
        <div class="panel-header images-panel-header">
          <div class="panel-title">Ordre du diaporama</div>
          <div class="images-count">
            <span id="images-count">0</span> image(s)
          </div>
        </div>
        <div class="images-grid-wrapper">
          <div id="images"></div>
        </div>
      </div>
    </main>
  </div>

  <script>
    const initialFiles = {{ files|tojson|safe }};
    let items = initialFiles.map(f => ({ file: f, duration: 3 }));

    const imagesDiv = document.getElementById('images');
    const imagesCountSpan = document.getElementById('images-count');
    const statusBar = document.getElementById('status');
    const statusText = document.getElementById('status-text');




    function setStatus(text, color = '') {
      statusBar.textContent = text;
      statusText.textContent = text;
      if (color) {
        statusBar.style.color = color;
        statusText.style.color = color;
      } else {
        statusBar.style.color = '';
        statusText.style.color = '';
      }
    }

    function render() {
      imagesDiv.innerHTML = '';
      items.forEach((it, idx) => {
        const div = document.createElement('div');
        div.className = 'item';
        div.draggable = true;
        div.dataset.idx = idx;

        div.innerHTML = `
          <div class="item-header">
            <div class="item-index">#${idx + 1}</div>
            <div class="item-filename" title="${it.file}">${it.file}</div>
            <button type="button" class="del-btn" data-file="${it.file}" title="Supprimer">✕</button>
          </div>
          <img class="thumb" src="/uploads/${encodeURIComponent(it.file)}">
          <div class="item-controls">
            <span class="dur-label">Durée (s)</span>
            <input
              type="number"
              min="1"
              max="60"
              value="${it.duration}"
              data-idx="${idx}"
              class="dur-input">
          </div>
        `;
        imagesDiv.appendChild(div);
      });
      imagesCountSpan.textContent = items.length;
    }

    render();

    // Redimensionnement local des images avant upload
    function resizeImage(file, maxWidth = 1280, maxHeight = 720, quality = 0.8) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        const reader = new FileReader();

        reader.onload = (e) => {
          img.src = e.target.result;
        };
        reader.onerror = (err) => reject(err);

        img.onload = () => {
          const canvas = document.createElement('canvas');
          let { width, height } = img;

          if (width > height) {
            if (width > maxWidth) {
              height *= maxWidth / width;
              width = maxWidth;
            }
          } else {
            if (height > maxHeight) {
              width *= maxHeight / height;
              height = maxHeight;
            }
          }

          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);

          canvas.toBlob((blob) => {
            if (!blob) {
              reject(new Error("Erreur canvas.toBlob()"));
              return;
            }
            const newName = file.name.replace(/\.[^/.]+$/, '.jpg');
            const resizedFile = new File([blob], newName, { type: 'image/jpeg' });
            resolve(resizedFile);
          }, 'image/jpeg', quality);
        };

        img.onerror = (err) => reject(err);

        reader.readAsDataURL(file);
      });
    }

    // Upload multiple avec redimensionnement

const fileInput = document.getElementById('fileInput');
const selectFilesBtn = document.getElementById('selectFilesBtn');
const selectedFilesLabel = document.getElementById('selectedFilesLabel');

selectFilesBtn.addEventListener('click', () => {
  fileInput.click();
});

fileInput.addEventListener('change', () => {
  const files = Array.from(fileInput.files || []);
  if (!files.length) {
    selectedFilesLabel.textContent = '';
    return;
  }
  if (files.length === 1) {
    selectedFilesLabel.textContent = files[0].name;
  } else {
    selectedFilesLabel.textContent = `${files.length} fichiers sélectionnés`;
  }
});


    document.getElementById('uploadForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const input = fileInput; // au lieu de e.target.querySelector('input[type="file"]')
   // const input = e.target.querySelector('input[type="file"]');
      const files = Array.from(input.files || []);
      if (files.length === 0) return;

      setStatus(`Redimensionnement de ${files.length} image(s)...`, '#e5e7eb');

      const fd = new FormData();

      try {
        for (const file of files) {
          const resized = await resizeImage(file, 1280, 720, 0.8);
          fd.append('files', resized);
        }

        setStatus(`Upload de ${files.length} image(s)...`, '#e5e7eb');

        const res = await fetch('/upload', { method: 'POST', body: fd });
        const data = await res.json();

        (data.files || []).forEach(name => {
          items.push({ file: name, duration: 3 });
        });
        render();
        e.target.reset();
        setStatus(`${files.length} image(s) ajoutée(s) (redimensionnées)`, '#22c55e');
      } catch (err) {
        console.error(err);
        setStatus('Erreur lors du redimensionnement / upload', '#f97373');
      }
    });

    // Mise à jour des durées
    imagesDiv.addEventListener('change', (e) => {
      if (e.target.classList.contains('dur-input')) {
        const idx = parseInt(e.target.dataset.idx, 10);
        const v = parseInt(e.target.value, 10);
        items[idx].duration = (v >= 1 && v <= 60) ? v : 3;
        e.target.value = items[idx].duration;
      }
    });

    // Drag & drop réordonnable
    let dragIndex = null;

    imagesDiv.addEventListener('dragstart', (e) => {
      const item = e.target.closest('.item');
      if (!item) return;
      dragIndex = parseInt(item.dataset.idx, 10);
      e.dataTransfer.effectAllowed = 'move';
    });

    imagesDiv.addEventListener('dragover', (e) => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
    });

    imagesDiv.addEventListener('drop', (e) => {
      e.preventDefault();
      const targetItem = e.target.closest('.item');
      if (!targetItem || dragIndex === null) return;
      const dropIndex = parseInt(targetItem.dataset.idx, 10);
      if (dropIndex === dragIndex) return;

      const moved = items.splice(dragIndex, 1)[0];
      items.splice(dropIndex, 0, moved);
      dragIndex = null;
      render();
    });

    imagesDiv.addEventListener('dragend', () => {
      dragIndex = null;
    });

    // Suppression d'une image
    imagesDiv.addEventListener('click', async (e) => {
      if (e.target.classList.contains('del-btn')) {
        const file = e.target.dataset.file;
        if (!confirm(`Supprimer ${file} ?`)) return;

        const res = await fetch('/delete', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ file })
        });
        const data = await res.json();
        if (!res.ok || data.status !== 'ok') {
          alert('Erreur suppression: ' + (data.error || 'inconnue'));
          return;
        }

        items = items.filter(it => it.file !== file);
        render();
      }
    });

    // Génération vidéo
    const genBtn = document.getElementById('generateBtn');

    genBtn.addEventListener('click', async () => {
      const itemsToSend = items.map(it => ({ file: it.file, duration: it.duration }));

      setStatus(`Préparation (${itemsToSend.length} images)...`, '#e5e7eb');

      try {
        const res = await fetch('/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ items: itemsToSend }),
        });

        const data = await res.json();

        if (!res.ok || data.status !== 'ok') {
          if (data.step === 'segment') {
            setStatus(
              `Erreur ffmpeg (image ${ (data.index || 0) + 1 }/${itemsToSend.length })`,
              '#f97373'
            );
          } else if (data.step === 'concat') {
            setStatus('Erreur ffmpeg lors de la concaténation', '#f97373');
          } else {
            setStatus(data.error || 'Erreur de génération vidéo', '#f97373');
          }
          return;
        }

        setStatus(
          `Vidéo générée (${data.segments} segments) – ${formatSize(data.size)} – ${data.mtime}`,
          '#22c55e'
        );

        await loadVideoInfo?.();

      } catch (e) {
        setStatus('Erreur réseau / serveur pendant la génération', '#f97373');
      }
    });

    const clearBtn = document.getElementById('clearBtn');

    clearBtn.addEventListener('click', async () => {
      if (!confirm("Supprimer TOUTES les images ?")) return;

      const res = await fetch('/delete_all', { method: 'POST' });
      const data = await res.json();
      if (!res.ok || data.status !== 'ok') {
        alert('Erreur suppression: ' + (data.error || 'inconnue'));
        return;
      }
      items = [];
      render();
    });

    // Aperçu vidéo existante
    const previewInfo = document.getElementById('preview-info');
    const previewVideoDiv = document.getElementById('preview-video');

    function formatSize(bytes) {
      if (bytes === 0) return "0 B";
      const k = 1024;
      const units = ["B", "KB", "MB", "GB"];
      let i = 0;
      let v = bytes;
      while (v >= k && i < units.length - 1) {
        v /= k;
        i++;
      }
      return v.toFixed(1) + " " + units[i];
    }

    async function loadVideoInfo() {
      try {
        const res = await fetch('/video_info');
        if (!res.ok) {
          previewInfo.textContent = "Impossible de récupérer les infos vidéo.";
          return;
        }
        const data = await res.json();
        if (!data.exists) {
          previewInfo.textContent = "Aucune vidéo générée pour le moment.";
          previewVideoDiv.innerHTML = "";
          return;
        }
        previewInfo.textContent =
          `Taille : ${formatSize(data.size)} – générée le ${data.mtime}`;

        previewVideoDiv.innerHTML = `
          <video width="320" controls preload="metadata">
            <source src="/video" type="video/mp4">
            Votre navigateur ne supporte pas la vidéo HTML5.
          </video>
        `;
      } catch (e) {
        previewInfo.textContent = "Erreur lors du chargement de la vidéo.";
      }
    }

    loadVideoInfo();
    setStatus('Prêt');
  </script>
</body>
</html>
